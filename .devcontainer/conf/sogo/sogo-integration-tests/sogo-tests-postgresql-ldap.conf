{
  /* *********************  Main SOGo configuration file  **********************
   *                                                                           *
   * Since the content of this file is a dictionary in OpenStep plist format,  *
   * the curly braces enclosing the body of the configuration are mandatory.   *
   * See the Installation Guide for details on the format.                     *
   *                                                                           *
   * C and C++ style comments are supported.                                   *
   *                                                                           *
   * This example configuration contains only a subset of all available        *
   * configuration parameters. Please see the installation guide more details. *
   *                                                                           *
   * ~sogo/GNUstep/Defaults/.GNUstepDefaults has precedence over this file,    *
   * make sure to move it away to avoid unwanted parameter overrides.          *
   *                                                                           *
   * **************************************************************************/

  /* Database configuration (mysql://, postgresql:// or oracle://) */
  WOPort = "0.0.0.0:50000";

  SOGoTimeZone = "Europe/Paris";

  SOGoMailDomain = "example.org";
  SOGoLanguage = "English";
  SOGoSuperUsernames = ("sogo-tests-super");
  
  SOGoUserSources = (
      {
        CNFieldName = cn; 
        IDFieldName = uid; 
        UIDFieldName = uid; 
        baseDN = "ou=users,dc=example,dc=org";
        bindDN = "cn=admin,dc=example,dc=org";
        bindPassword = "password"; 
        canAuthenticate = YES; 
        displayName = "Shared Addresses"; 
        hostname = "openldap"; 
        id = public; 
        isAddressBook = YES; 
        port = 389; 
        KindFieldName = description; 
        MultipleBookingsFieldName=departmentNumber;
      }
  );
  
  SOGoMailingMechanism = smtp;
  SOGoSMTPServer = smtpd;
  SOGoSieveServer = "sieve://imapd:4190";
  SOGoIMAPServer = "imap://imapd:143";
  SOGoForwardEnabled = YES;
  SOGoVacationEnabled = YES;
  SOGoSieveScriptsEnabled = YES;
  SOGoEnablePublicAccess = YES;
  SOGoMemcachedHost = "/dev/null";
  SOGoCalendarDefaultRoles = ("PublicDAndTViewer");
  SOGoXSRFValidationEnabled = NO;


  SOGoProfileURL        = "postgresql://sogobuild:sogo123@postgres:5432/sogo_integration_tests/sogo_user_profile";
  OCSFolderInfoURL      = "postgresql://sogobuild:sogo123@postgres:5432/sogo_integration_tests/sogo_folder_info";
  OCSSessionsFolderURL  = "postgresql://sogobuild:sogo123@postgres:5432/sogo_integration_tests/sogo_sessions_folder";
  
  SoDebugBaseURL = YES;
  SOGoDebugRequests = YES;
  ImapDebugEnabled = YES;
  LDAPDebugEnabled = YES;
  SMTPDebugEnabled = YES;
}


